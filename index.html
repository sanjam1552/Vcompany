<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RVNL Mirror — January–March 2026 | Issue 22</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --navy: #0a1628;
  --deep-blue: #0d2444;
  --mid-blue: #1a3a6b;
  --steel: #1e5fa8;
  --accent: #c8102e;
  --accent2: #e8b800;
  --light-blue: #4a8fd4;
  --pale: #d6e4f5;
  --white: #ffffff;
  --off-white: #f0f4fb;
  --text-light: #b8cde8;
  --grid-line: rgba(74,143,212,0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Barlow', sans-serif;
  background: var(--navy);
  color: var(--white);
}

/* HEADER */
.site-header {
  position: relative;
  background: var(--deep-blue);
  overflow: hidden;
}

.header-grid-bg {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size: 48px 48px;
  opacity: 0.6;
}

.header-diagonal {
  position: absolute;
  bottom: -1px; right: 0;
  width: 55%;
  height: 100%;
  background: linear-gradient(135deg, var(--steel), transparent);
  clip-path: polygon(20% 0, 100% 0, 100% 100%, 0% 100%);
  opacity: 0.22;
}

.header-inner {
  position: relative;
  display: grid;
  grid-template-columns: 1fr;
  min-height: 380px;
  align-items: center;
}

.header-left {
  padding: 70px 60px;
  max-width: 780px;
}

.logo-mark {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 28px;
}

.logo-slashes {
  font-family: 'Barlow Condensed';
  font-size: 2.4rem;
  font-weight: 800;
  color: var(--accent);
}

.logo-text {
  border-left: 3px solid var(--steel);
  padding-left: 14px;
}

.org-name {
  font-family: 'Barlow Condensed';
  font-size: 2.6rem;
  font-weight: 800;
  letter-spacing: 4px;
}

.pub-name {
  font-size: 1.1rem;
  color: var(--light-blue);
  letter-spacing: 8px;
}

/* BADGE */
.issue-badge {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: linear-gradient(90deg, var(--accent), #a50d24);
  padding: 8px 20px;
  margin-bottom: 26px;
  box-shadow: 0 4px 14px rgba(200,16,46,0.3);
}

.issue-badge span {
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* HEADLINE */
.header-headline {
  font-family: 'Barlow Condensed';
  font-size: 4.2rem;
  font-weight: 800;
  line-height: 0.95;
  text-transform: uppercase;
  margin-top: 10px;
  animation: fadeUp 0.8s ease forwards;
}

.header-headline .highlight {
  color: var(--accent2);
  display: block;
  text-shadow: 0 0 20px rgba(232,184,0,0.25);
}

/* ANIMATION */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<header class="site-header">
  <div class="header-grid-bg"></div>
  <div class="header-diagonal"></div>

  <div class="header-inner">
    <div class="header-left">

      <div class="logo-mark">
        <span class="logo-slashes">//</span>
        <div class="logo-text">
          <div class="org-name">RVNL</div>
          <div class="pub-name">Mirror</div>
        </div>
      </div>

      <div class="issue-badge">
        <span>January – March 2026</span>
        <span>|</span>
        <span>Issue 22</span>
      </div>

      <h1 class="header-headline">
        Building India's
        <span class="highlight">Rail Future</span>
      </h1>

    </div>
  </div>
</header>

</body>
</html>
